<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8" />
<title>Visor de Sitios - Tláhuac</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin: 0; display: flex; font-family: Arial, sans-serif; }

/* PANEL */
#sidebar {
    width: 300px;
    background: #1f2937;
    color: white;
    padding: 15px;
}

/* MAPA */
#map {
    flex: 1;
    height: 100vh;
}
</style>

</head>

<body>

<!-- PANEL -->

<div id="sidebar">
    <h2>Visor de Sitios</h2>

```
<p><b>Proyecto:</b><br>Zonas de análisis en Tláhuac</p>
<p><b>Fuente:</b><br>Análisis SIG multicriterio</p>

<hr>

<p>📍 Haz clic en los puntos para ver su ubicación en Google Maps</p>
```

</div>

<!-- MAPA -->

<div id="map"></div>

<script>

// MAPA BASE
var map = L.map('map').setView([19.28, -99.12], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// ESTILO DE PUNTOS
function pointToLayer(feature, latlng) {
    return L.circleMarker(latlng, {
        radius: 6,
        fillColor: '#2563eb',
        color: '#ffffff',
        weight: 1,
        fillOpacity: 0.9
    });
}

// POPUP
function onEachFeature(feature, layer) {
    layer.bindPopup(
        "<b>Sitio:</b> " + feature.properties.sitio_id +
        "<br><br><a href='" + feature.properties.Maps + "' target='_blank'>📍 Ver en Google Maps</a>"
    );
}

// CARGAR DATOS
fetch('puntos_riesgo.geojson')
.then(res => res.json())
.then(data => {
    var puntos = L.geoJSON(data, {
        pointToLayer: pointToLayer,
        onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds(puntos.getBounds());
});

</script>

</body>
</html>
