<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8" />
<title>Puntos de Riesgo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }
</style>

</head>

<body>
<div id="map"></div>

<script>

// Crear mapa
var map = L.map('map').setView([19.28, -99.12], 12);

// ✅ NUEVO MAPA BASE (Carto - sin bloqueo)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// Popup
function onEachFeature(feature, layer) {
    layer.bindPopup(
        "<b>ID:</b> " + feature.properties.sitio_id +
        "<br>" + feature.properties.gmaps_btn
    );
}

// Cargar datos
fetch('puntos_riesgo.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        onEachFeature: onEachFeature
    }).addTo(map);
});

</script>

</body>
</html>
